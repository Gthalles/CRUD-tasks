server:
  port: 8080

spring:
  application:
    name: todo-list

  datasource:
    url: jdbc:mysql://localhost:3306/todo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: todo_user
    password: todo_pass

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: debug
    # deixe esse só quando precisar ver bind de parâmetros:
    # org.hibernate.orm.jdbc.bind: trace